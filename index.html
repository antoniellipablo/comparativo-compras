<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparativo de Compras — Milhas & Cashback</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --surface2: #212128;
    --border: #2e2e38;
    --text: #e8e8f0;
    --muted: #888898;
    --input-bg: #1c1c24;
    --accent: #f0c040;
    --accent2: #5be0a0;
    --accent3: #f06090;
    --winner-bg: rgba(91,224,160,0.09);
    --winner-border: #5be0a0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; }

  header {
    padding: 26px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 16px;
  }
  .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 12px; margin-top: 2px; }

  main { padding: 28px 40px; max-width: 1500px; }

  .section-title {
    font-family: 'Syne', sans-serif; font-size: 10px; text-transform: uppercase;
    letter-spacing: 2px; color: var(--muted); margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── PREMISSAS ── */
  .premissas-block {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px 24px; margin-bottom: 16px;
  }
  .prem-line-label {
    font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--muted); margin-bottom: 10px; font-family: 'DM Mono', monospace;
  }
  .premissas-row { display: flex; flex-wrap: wrap; gap: 10px; }
  .premissas-sep { height: 1px; background: var(--border); margin: 18px 0; }

  .premissa-card {
    background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 15px; min-width: 155px;
  }
  .premissa-card.partner-card { border-left-width: 3px; }
  .premissa-label {
    font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin-bottom: 6px; font-family: 'DM Mono', monospace;
  }
  .premissa-input {
    background: transparent; border: none; border-bottom: 1px solid var(--border);
    color: var(--accent); font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500;
    width: 100%; padding: 3px 0; outline: none; transition: border-color .2s;
    -moz-appearance: textfield;
  }
  .premissa-input::-webkit-inner-spin-button,
  .premissa-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .premissa-input:focus { border-bottom-color: var(--accent); }
  .premissa-unit { font-size: 9px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }

  /* ── STORES ── */
  .stores-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 20px; margin-bottom: 26px;
  }
  .stores-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .store-tag {
    display: flex; align-items: center; gap: 5px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 12px;
  }
  .store-tag input {
    background: transparent; border: none; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 12px; width: 80px; outline: none;
  }
  .store-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 0; }
  .store-remove:hover { color: var(--accent3); }
  .btn-ghost {
    background: transparent; border: 1px dashed var(--border);
    border-radius: 20px; padding: 5px 14px; color: var(--muted);
    font-size: 12px; cursor: pointer; transition: all .2s;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── TABS ── */
  .tabs-wrap { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 18px; align-items: center; }
  .tab {
    padding: 6px 15px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 11px; cursor: pointer; transition: all .15s; white-space: nowrap; display: flex; align-items: center; gap: 5px;
  }
  .tab:hover:not(.active) { color: var(--text); border-color: #555; }
  .tab.active { color: #fff; font-weight: 600; border-color: transparent; }
  .tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* ── PARTNER BADGE ── */
  .partner-badge-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .partner-badge {
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800;
    padding: 3px 14px; border-radius: 20px; color: #fff;
  }
  .type-badge { font-size: 11px; color: var(--muted); }

  /* ── TABLE ── */
  .table-wrapper { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 32px; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--surface); padding: 10px 12px; text-align: left;
    font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  thead th.input-col { color: var(--accent); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  tbody tr.winner-row { background: var(--winner-bg); }

  td {
    padding: 9px 12px; font-family: 'DM Mono', monospace; font-size: 12px; white-space: nowrap;
  }
  td.store-name { color: var(--muted); font-size: 11px; min-width: 72px; }
  td.calc { color: var(--text); }
  td.final-price { font-weight: 500; color: var(--accent2); }
  td.winner-col { min-width: 76px; font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; color: var(--accent2); text-transform: uppercase; letter-spacing: 1px; }

  /* ── CELL INPUTS (text type to avoid cursor jump) ── */
  .cell-input {
    background: var(--input-bg); border: 1px solid transparent;
    border-radius: 5px; color: var(--accent); font-family: 'DM Mono', monospace;
    font-size: 12px; padding: 4px 8px; width: 100px; outline: none; transition: border-color .15s;
  }
  .cell-input.sm { width: 80px; }
  .cell-input:focus { border-color: var(--accent); background: #1a1a22; }
  .cell-input::placeholder { color: #444; }

  /* ── CARTÃO CHECKBOX ── */
  .cartao-check { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .check-box {
    width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border);
    background: var(--input-bg); display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0;
  }
  .check-box.on { background: var(--accent2); border-color: var(--accent2); }
  .check-box.on::after { content: '✓'; font-size: 10px; color: #0e0e10; font-weight: 700; line-height: 1; }
  .cartao-label { font-size: 10px; color: var(--muted); white-space: nowrap; }
  td.cartao-cell { min-width: 105px; }

  /* ── WINNER ── */
  .winner-box {
    background: var(--surface); border: 1px solid var(--winner-border);
    border-radius: 14px; padding: 22px 28px; margin-bottom: 40px;
  }
  .w-empty { color: var(--muted); font-size: 13px; margin-top: 10px; font-family: 'DM Mono', monospace; }
  .ranking-list { display: flex; flex-direction: column; gap: 6px; margin-top: 16px; }
  .rank-item {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 16px; transition: background .12s;
  }
  .rank-item.first { background: var(--winner-bg); border-color: var(--winner-border); }
  .rank-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); min-width: 22px; text-align: right; flex-shrink: 0; }
  .rank-item.first .rank-num { color: var(--accent2); font-weight: 700; }
  .rank-trophy { font-size: 15px; flex-shrink: 0; width: 18px; text-align: center; }
  .rank-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; flex: 1; min-width: 0; }
  .rank-name .r-sep { color: var(--muted); font-weight: 400; margin: 0 6px; font-family: 'DM Mono', monospace; font-size: 11px; }
  .rank-name .r-store { font-weight: 400; font-size: 13px; color: var(--text); font-family: 'DM Sans', sans-serif; }
  .rank-price { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent2); flex-shrink: 0; }
  .rank-item:not(.first) .rank-price { color: var(--muted); }
  .rank-savings { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); flex-shrink: 0; min-width: 130px; text-align: right; }
  .rank-item:not(.first) .rank-savings { color: transparent; }

  @media (max-width: 700px) {
    header, main { padding: 16px; }
    .premissas-row { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Comparativo <span>Milhas & Cashback</span></div>
    <div class="subtitle">Compare o preço real após pontos e cashback em cada parceiro</div>
  </div>
</header>

<main>

  <div class="section-title">Premissas</div>
  <div class="premissas-block">

    <div class="prem-line-label">Cartão de crédito</div>
    <div class="premissas-row" id="rowCartao"></div>

    <div class="premissas-sep"></div>

    <div class="prem-line-label">Parceiros de milhas — R$/milheiro</div>
    <div class="premissas-row" id="rowParceiros"></div>

  </div>

  <div class="stores-section">
    <div class="section-title" style="margin-bottom:0">Lojas / Sites</div>
    <div style="color:var(--muted);font-size:12px;margin-top:4px;">Personalize os nomes das lojas que você vai pesquisar</div>
    <div class="stores-grid" id="storesGrid"></div>
  </div>

  <div class="section-title">Parceiros</div>
  <div class="tabs-wrap" id="tabsWrap"></div>

  <div class="partner-badge-bar">
    <div class="partner-badge" id="partnerBadge"></div>
    <div class="type-badge" id="typeBadge"></div>
  </div>

  <div class="table-wrapper">
    <table>
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="winner-box">
    <div class="section-title" style="margin-bottom:0">Ganhador Geral</div>
    <div id="winnerContent"></div>
  </div>

</main>

<script>
// ─── PARTNER META ─────────────────────────────────────────────────────────────
const PMETA = {
  'LIVELO':           { color: '#e8267a', type: 'milhas' },
  'ESFERA':           { color: '#c0292b', type: 'milhas' },
  'AZUL':             { color: '#1a6fba', type: 'milhas' },
  'LATAM':            { color: '#cc0033', type: 'milhas' },
  'SMILES':           { color: '#f07a20', type: 'milhas' },
  'SEM PARCEIRO':     { color: '#666677', type: 'milhas' },
  'MELIUZ':           { color: '#ff5722', type: 'cashback' },
  'INTER':            { color: '#f97316', type: 'cashback' },
  'CUPONOMIA':        { color: '#8b5cf6', type: 'cashback' },
  'MY CASHBACK':      { color: '#0ea5e9', type: 'cashback' },
  'TOP CASHBACK US':  { color: '#14b8a6', type: 'cashback' },
  'TOP CASHBACK UK':  { color: '#6366f1', type: 'cashback' },
};
function pColor(p) { return (PMETA[p]||{}).color || '#888'; }
function pType(p)  { return (PMETA[p]||{}).type  || 'cashback'; }

// ─── STATE ────────────────────────────────────────────────────────────────────
const S = {
  dolar: 5.00,
  pontosPorDolar: 5,
  cartaoRsMil: 30,
  premissas: { 'SEM PARCEIRO':0, LIVELO:30, ESFERA:30, AZUL:13, LATAM:23, SMILES:15 },
  partners: ['SEM PARCEIRO','LIVELO','ESFERA','AZUL','LATAM','SMILES',
             'MELIUZ','INTER','CUPONOMIA','MY CASHBACK','TOP CASHBACK US','TOP CASHBACK UK'],
  stores: ['Loja 1','Loja 2','Loja 3','Loja 4','Loja 5'],
  active: 'SEM PARCEIRO',
  data: {},
};

function getD(partner, store) {
  if (!S.data[partner]) S.data[partner] = {};
  if (!S.data[partner][store]) S.data[partner][store] = { preco:'', pts:'', cartao:true };
  return S.data[partner][store];
}

// ─── CALC ─────────────────────────────────────────────────────────────────────
function calc(partner, store) {
  const d = getD(partner, store);
  const preco = parseFloat(d.preco) || 0;
  const pts   = parseFloat(d.pts)   || 0;
  const type  = pType(partner);

  let rbParceiro = 0;
  if (type === 'milhas') {
    const rsMil = S.premissas[partner] || 0;
    rbParceiro = preco * pts * (rsMil / 1000);
  } else {
    // pts entered as whole number: 5 means 5% = 0.05
    rbParceiro = preco * (pts / 100);
  }

  const apos = preco - rbParceiro;

  let ptCartao = 0, rbCartao = 0;
  if (d.cartao && preco > 0) {
    ptCartao = (preco / S.dolar) * S.pontosPorDolar;
    rbCartao = ptCartao * (S.cartaoRsMil / 1000);
  }

  return { preco, pts, type, cartao: d.cartao, rbParceiro, apos, ptCartao, rbCartao, final: apos - rbCartao };
}

// ─── FORMAT ───────────────────────────────────────────────────────────────────
function fR(n) {
  if (!n && n !== 0) return '—';
  return 'R$ ' + Math.abs(n).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}
function fP(n) { if (!n) return '—'; return n.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }

// ─── PREMISSAS ────────────────────────────────────────────────────────────────
function renderPremissas() {
  const r1 = document.getElementById('rowCartao');
  r1.innerHTML = '';
  [
    { label:'Cotação do Dólar',           key:'dolar',        val:S.dolar,          unit:'R$/US$' },
    { label:'Pontos por Dólar (Cartão)',   key:'pontosPorDolar',val:S.pontosPorDolar, unit:'pts/US$' },
    { label:'R$/Milheiro do seu Cartão',  key:'cartaoRsMil',  val:S.cartaoRsMil,    unit:'R$ por 1.000 pts' },
  ].forEach(({label,key,val,unit}) => {
    const c = document.createElement('div');
    c.className = 'premissa-card';
    c.innerHTML = `<div class="premissa-label">${label}</div>
      <input class="premissa-input" type="number" step="0.01" value="${val}" data-key="${key}">
      <div class="premissa-unit">${unit}</div>`;
    r1.appendChild(c);
  });

  const r2 = document.getElementById('rowParceiros');
  r2.innerHTML = '';
  Object.entries(S.premissas).forEach(([p, val]) => {
    if (p === 'SEM PARCEIRO') return; // sem benefício de parceiro, não precisa de premissa
    const col = pColor(p);
    const c = document.createElement('div');
    c.className = 'premissa-card partner-card';
    c.style.borderLeftColor = col;
    c.innerHTML = `<div class="premissa-label" style="color:${col}">${p}</div>
      <input class="premissa-input" type="number" step="0.5" value="${val}" data-key="prem_${p}">
      <div class="premissa-unit">R$/milheiro</div>`;
    r2.appendChild(c);
  });

  document.querySelectorAll('.premissa-input').forEach(inp => {
    inp.addEventListener('change', e => {
      const k = e.target.dataset.key, v = parseFloat(e.target.value) || 0;
      if (k === 'dolar') S.dolar = v;
      else if (k === 'pontosPorDolar') S.pontosPorDolar = v;
      else if (k === 'cartaoRsMil') S.cartaoRsMil = v;
      else if (k.startsWith('prem_')) S.premissas[k.slice(5)] = v;
      renderTable(); renderWinner();
    });
  });
}

// ─── STORES ───────────────────────────────────────────────────────────────────
function renderStores() {
  const grid = document.getElementById('storesGrid');
  grid.innerHTML = '';
  S.stores.forEach((s,i) => {
    const t = document.createElement('div');
    t.className = 'store-tag';
    t.innerHTML = `<input type="text" value="${s}" data-i="${i}" maxlength="24">
      <button class="store-remove" data-i="${i}">×</button>`;
    grid.appendChild(t);
  });
  const add = document.createElement('button');
  add.className = 'btn-ghost'; add.textContent = '+ Adicionar loja';
  add.onclick = () => { S.stores.push(`Loja ${S.stores.length + 1}`); refresh(); };
  grid.appendChild(add);
  grid.querySelectorAll('.store-tag input').forEach(inp =>
    inp.addEventListener('change', e => { S.stores[+e.target.dataset.i] = e.target.value; renderTable(); renderWinner(); }));
  grid.querySelectorAll('.store-remove').forEach(btn =>
    btn.onclick = e => { S.stores.splice(+e.target.dataset.i,1); refresh(); });
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function renderTabs() {
  const wrap = document.getElementById('tabsWrap');
  wrap.innerHTML = '';
  S.partners.forEach(p => {
    const col = pColor(p);
    const isActive = p === S.active;
    const btn = document.createElement('button');
    btn.className = 'tab' + (isActive ? ' active' : '');
    if (isActive) btn.style.background = col;
    btn.innerHTML = `<span class="tab-dot" style="background:${col}"></span>${p}`;
    btn.onclick = () => { S.active = p; renderTabs(); renderTable(); };
    wrap.appendChild(btn);
  });
  const addP = document.createElement('button');
  addP.className = 'btn-ghost'; addP.textContent = '+ Parceiro';
  addP.onclick = () => {
    const name = prompt('Nome do novo parceiro:');
    if (!name || !name.trim()) return;
    const n = name.trim().toUpperCase();
    if (S.partners.includes(n)) { alert('Parceiro já existe.'); return; }
    S.partners.push(n);
    if (pType(n) === 'milhas') S.premissas[n] = 30;
    S.active = n;
    renderPremissas(); renderTabs(); renderTable(); renderWinner();
  };
  wrap.appendChild(addP);
}

// ─── TABLE ────────────────────────────────────────────────────────────────────
function renderTable() {
  const p = S.active, col = pColor(p), type = pType(p);
  document.getElementById('partnerBadge').textContent = p;
  document.getElementById('partnerBadge').style.background = col;
  document.getElementById('typeBadge').textContent =
    type === 'milhas' ? 'Parceiro de milhas/pontos' : 'Parceiro de cashback';

  const head = document.getElementById('tableHead');
  const ptsLabel = type === 'milhas' ? 'Pts/Real ✎' : '% Cashback ✎';
  head.innerHTML = `<tr>
    <th>Loja</th>
    <th class="input-col">Preço R$ ✎</th>
    <th class="input-col">${ptsLabel}</th>
    <th>Cashback Parceiro</th>
    <th>Preço após Parceiro</th>
    <th>Usar Cartão</th>
    <th>Pts Cartão</th>
    <th>Cashback Cartão</th>
    <th>Preço Final</th>
    <th></th>
  </tr>`;

  const body = document.getElementById('tableBody');
  body.innerHTML = '';

  S.stores.forEach(store => {
    const c = calc(p, store);
    const d = getD(p, store);
    const hint = type === 'milhas' ? 'pts/R$' : 'ex: 5 = 5%';

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="store-name">${store}</td>
      <td><input class="cell-input" type="text" inputmode="decimal" placeholder="0,00"
          value="${d.preco}" data-p="${p}" data-s="${store}" data-f="preco"></td>
      <td><input class="cell-input sm" type="text" inputmode="decimal" placeholder="${hint}"
          value="${d.pts}" data-p="${p}" data-s="${store}" data-f="pts"></td>
      <td class="calc">${c.preco ? fR(c.rbParceiro) : '—'}</td>
      <td class="calc">${c.preco ? fR(c.apos) : '—'}</td>
      <td class="cartao-cell">
        <label class="cartao-check" data-p="${p}" data-s="${store}">
          <div class="check-box ${c.cartao ? 'on' : ''}"></div>
          <span class="cartao-label">com cartão</span>
        </label>
      </td>
      <td class="calc">${c.preco && c.cartao ? fP(c.ptCartao) : '—'}</td>
      <td class="calc">${c.preco && c.cartao ? fR(c.rbCartao) : '—'}</td>
      <td class="final-price">${c.preco ? fR(c.final) : '—'}</td>
      <td class="winner-col" data-wk="${p}|${store}"></td>`;
    body.appendChild(tr);
  });

  // Input events — use 'input' but keep cursor in place by NOT re-rendering the whole table
  body.querySelectorAll('.cell-input').forEach(inp => {
    inp.addEventListener('change', e => {
      const raw = e.target.value.replace(',', '.');
      getD(e.target.dataset.p, e.target.dataset.s)[e.target.dataset.f] = raw;
      refreshCalcs(); renderWinner();
    });
  });

  body.querySelectorAll('.cartao-check').forEach(lbl => {
    lbl.addEventListener('click', () => {
      const d = getD(lbl.dataset.p, lbl.dataset.s);
      d.cartao = !d.cartao;
      refreshCalcs(); renderWinner();
    });
  });

  markWinner();
}

// refreshCalcs: atualiza só as células calculadas sem recriar os inputs (evita cursor jump)
function refreshCalcs() {
  const p = S.active;
  S.stores.forEach(store => {
    const c = calc(p, store);
    const d = getD(p, store);
    // Find the row by winner cell key
    const wCell = document.querySelector(`[data-wk="${p}|${store}"]`);
    if (!wCell) return;
    const tds = wCell.closest('tr').querySelectorAll('td');
    // col indices: 0=store,1=preco_input,2=pts_input,3=rbParceiro,4=apos,5=cartao,6=pts,7=rbCartao,8=final,9=winner
    tds[3].textContent = c.preco ? fR(c.rbParceiro) : '—';
    tds[4].textContent = c.preco ? fR(c.apos) : '—';
    // update checkbox visual
    const box = tds[5].querySelector('.check-box');
    if (box) { box.classList.toggle('on', c.cartao); }
    tds[6].textContent = c.preco && c.cartao ? fP(c.ptCartao) : '—';
    tds[7].textContent = c.preco && c.cartao ? fR(c.rbCartao) : '—';
    tds[8].textContent = c.preco ? fR(c.final) : '—';
    tds[8].className = 'final-price';
    tds[3].className = 'calc'; tds[4].className = 'calc';
    tds[6].className = 'calc'; tds[7].className = 'calc';
  });
  markWinner();
}

function markWinner() {
  const p = S.active;
  // Encontra melhor loja neste parceiro
  let bestStore = null, bestPrice = Infinity;
  S.stores.forEach(store => {
    const c = calc(p, store);
    if (c.preco && c.final < bestPrice) { bestPrice = c.final; bestStore = store; }
  });

  document.querySelectorAll('[data-wk]').forEach(cell => {
    const [, store] = cell.dataset.wk.split('|');
    const tr = cell.closest('tr');
    tr.classList.toggle('winner-row', store === bestStore);
    cell.textContent = store === bestStore && bestStore !== null ? '★ Melhor' : '';
  });
}

// ─── WINNER GERAL ────────────────────────────────────────────────────────────
function renderWinner() {
  // Coleta todos os resultados com preço preenchido
  const results = [];
  S.partners.forEach(partner => {
    S.stores.forEach(store => {
      const c = calc(partner, store);
      if (c.preco) results.push({ partner, store, price: c.final, orig: c.preco, savings: c.preco - c.final });
    });
  });

  const el = document.getElementById('winnerContent');
  if (results.length === 0) {
    el.innerHTML = '<div class="w-empty">Preencha os preços nas abas para ver o ranking geral.</div>';
    return;
  }

  // Ordena do menor para o maior preço final
  results.sort((a, b) => a.price - b.price);

  const items = results.map((r, i) => {
    const col = pColor(r.partner);
    const isFirst = i === 0;
    return `<div class="rank-item${isFirst ? ' first' : ''}">
      <div class="rank-num">${i + 1}º</div>
      <div class="rank-trophy">${isFirst ? '🏆' : ''}</div>
      <div class="rank-name">
        <span class="r-partner" style="color:${col}">${r.partner}</span>
        <span class="r-sep">—</span>
        <span class="r-store">${r.store}</span>
      </div>
      <div class="rank-price">${fR(r.price)}</div>
      <div class="rank-savings">${isFirst ? 'economia de ' + fR(r.savings) : ''}</div>
    </div>`;
  }).join('');

  el.innerHTML = `<div class="ranking-list">${items}</div>`;
}

function refresh() {
  renderStores(); renderTabs(); renderTable(); renderWinner();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderPremissas();
renderStores();
renderTabs();
renderTable();
renderWinner();
</script>
</body>
